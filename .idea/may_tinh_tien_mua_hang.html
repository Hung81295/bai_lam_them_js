<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Máy tính tiền mua hàng của claude</title>
</head>
<body>
<h2>Tính tiền mua hàng</h2>
<input type="number" placeholder="số lượng" id="soluong">
<select id="sanPham">
  <option value="">---Sản phẩm---</option>
  <option value="but_bi">Bút bi: 5,000đ</option>
  <option value="vo">Vở: 15,000đ</option>
  <option value="sach">Sách: 50,000đ</option>
  <option value="balo">Balo: 200,000đ</option>
</select>
<button onclick="tinh()">Tính tiền</button>
<p id="ketqua"></p>
<script>
  function tinh() {
    let soLuong = Number(document.getElementById("soluong").value);
    let sanpham = document.getElementById("sanPham").value;
    let thanhTien;
    let gia;
    if (soLuong <= 0) {
      gia = "Số lượng không hợp lệ!"
    } else if (sanpham===""){
      gia="Vui lòng chọn sản phẩm"
    }else {
      if (sanpham === "but_bi") {
        thanhTien = 5000;
      } else {
        if (sanpham === "vo") {
          thanhTien = 15000;
        } else if (sanpham === "sach") {
          thanhTien = 50000;
        } else if (sanpham === "balo") {
          thanhTien = 200000;
        }
      }
      gia=`Tổng tiền ${soLuong*thanhTien} đ`
    }
    document.getElementById("ketqua").innerHTML=gia;
    }
</script>
</body>
</html>
